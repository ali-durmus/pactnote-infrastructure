apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: air-quality-ingress
  annotations:
    # Traefik'e SSL almasını söylüyoruz
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    # Cert-manager'a Let's Encrypt kullanmasını söylüyoruz
    cert-manager.io/cluster-issuer: letsencrypt-prod 
spec:
  tls:
  - hosts:
    - air.pactnote.com
    secretName: air-pactnote-tls # Sertifika buraya kaydedilecek
  rules:
  - host: air.pactnote.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: air-quality-service
            port:
              number: 80
