apiVersion: v1
kind: ConfigMap
metadata:
  name: landing-page-html
  namespace: default
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>PactNote - Digital Innovation</title>
        <style>
            body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
            .container { text-align: center; background: white; padding: 50px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 500px; }
            .logo { max-width: 350px; width: 100%; height: auto; margin-bottom: 20px; }
            h1 { color: #2c3e50; margin: 0 0 10px 0; font-size: 2em; }
            .status { color: #e67e22; font-weight: bold; font-size: 1.1em; margin-bottom: 25px; }
            .motto { font-style: italic; color: #7f8c8d; border-top: 1px solid #eee; padding-top: 20px; margin-top: 20px; }
        </style>
    </head>
    <body>
        <div class="container">
            <img src="https://i.imgur.com/Vay0sjO.png" alt="PactNote Logo" class="logo">
            <h3>Digital Innovation</h3>
            <p class="status">🚧 Status: Under Construction</p>
            <p class="motto">Your Meeting. Your Agreement. Your Pact.</p>
        </div>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: landing-page-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: landing-page
  template:
    metadata:
      labels:
        app: landing-page
    spec:
      containers:
      - name: nginx
        image: nginx:1.25-alpine
        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html-volume
        configMap:
          name: landing-page-html
---
apiVersion: v1
kind: Service
metadata:
  name: landing-page-service
spec:
  selector:
    app: landing-page
  ports:
    - port: 80
      targetPort: 80
