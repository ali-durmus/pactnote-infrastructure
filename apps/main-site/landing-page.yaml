apiVersion: v1
kind: ConfigMap
metadata:
  name: landing-page-html
  namespace: default
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>PactNote - Digital Innovation</title>
        <style>
            body { background: #f4f7f6; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
            .container { text-align: center; background: white; padding: 50px; border-radius: 20px; shadow: 0 10px 25px rgba(0,0,0,0.1); }
            h1 { color: #2c3e50; }
            .motto { font-style: italic; color: #7f8c8d; }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>PactNote</h1>
            <p>🚧 Status: Under Construction</p>
            <p class="motto">"Your Meeting. Your Agreement. Your Pact."</p>
        </div>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: landing-page-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: landing-page
  template:
    metadata:
      labels:
        app: landing-page
    spec:
      containers:
      - name: nginx
        image: nginx:1.25-alpine
        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html-volume
        configMap:
          name: landing-page-html
---
apiVersion: v1
kind: Service
metadata:
  name: landing-page-service
spec:
  selector:
    app: landing-page
  ports:
    - port: 80
      targetPort: 80
