<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PactNote - Digital Innovation Under Construction</title>
    <style>
        body {
            background-color: #f4f7f6; /* Light gray background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }
        .container {
            text-align: center;
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .logo {
            max-width: 250px; /* Adjust size based on your logo image */
            margin-bottom: 20px;
        }
        h1 {
            color: #2c3e50; /* Professional dark blue */
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .status {
            color: #e67e22; /* Warning orange for construction status */
            font-weight: bold;
            font-size: 1.2em;
            margin-bottom: 30px;
        }
        .motto {
            font-style: italic;
            color: #7f8c8d;
            font-size: 1.1em;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://imgur.com/UHWljgJ" alt="PactNote Logo" class="logo">
        
        <h1>Digital Innovation</h1>
        <p class="status">🚧 Status: Under Construction - Estimated Launch: Summer 2024</p>
        
        <p class="motto">"Your Meeting. Your Agreement. Your Pact."</p>
    </div>
</body>
</html>
